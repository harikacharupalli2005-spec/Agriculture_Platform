<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password</title>
   <!-- App Icon -->
    <link rel="icon" type="image/png" href="images/agri-icon.png">

    <!-- PWA Manifest -->
    <link rel="manifest" href="manifest.json">

    <!-- Theme Color -->
    <meta name="theme-color" content="#2E7D32">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body class="login-page">

  <nav class="navbar">
    <div class="logo">🌾 Agriculture Platform</div>
    <ul class="nav-links">
      <li><a href="../index.html">Home</a></li>
      <li><a href="login.html">Login</a></li>
      <li><a href="signup.html">Signup</a></li>
      <li><a href="dashboard.html">Dashboard</a></li>
    </ul>
  </nav>

  <div class="form-container">
    <h2>Forgot Password</h2>

    <input type="email" id="forgotEmail" placeholder="Enter your registered email">

    <p id="forgotError" class="error"></p>
    <p id="forgotSuccess" class="success"></p>

    <button onclick="forgotPassword()">
      Send Reset Link
    </button>

    <p class="signup-text">
      Remember password?
      <a href="login.html">Login</a>
    </p>
  </div>

  <script src="../js/auth.js"></script>
  <script>
        if ("serviceWorker" in navigator) {
            navigator.serviceWorker.register("sw.js")
                .then(() => {
                    console.log("Service Worker Registered");
                })
                .catch((error) => {
                    console.log("Service Worker Error:", error);
                });
        }
    </script>
</body>
</html>
